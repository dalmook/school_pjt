<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ settings.app_name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-shell">
    <div class="site-header">
      <div class="brand-wrap">
        <a class="brand" href="/">NEIS School Alert</a>
        <p class="brand-subtitle">학생과 보호자를 위한 학교 생활 브리핑</p>
      </div>
      <nav class="nav">
        <a class="{% if request.url.path == '/' %}active{% endif %}" href="/">홈</a>
        <a class="{% if request.url.path.startswith('/profiles') %}active{% endif %}" href="/profiles">프로필</a>
        <a class="{% if request.url.path.startswith('/telegram') %}active{% endif %}" href="/telegram/connect">텔레그램 연결</a>
      </nav>
      <div class="auth-nav">
        {% if current_user and current_user.username %}
        <span class="auth-user">{{ current_user.username }}</span>
        <form method="post" action="/logout">
          <button class="button secondary" type="submit">로그아웃</button>
        </form>
        {% else %}
        <a class="button secondary" href="/login">로그인</a>
        <a class="button" href="/signup">회원가입</a>
        {% endif %}
      </div>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
